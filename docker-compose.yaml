# nginx proxy address - http://172.17.0.1:9444

name: freeipa
x-logging: &default-logging
  options:
    max-size: '5m'
    max-file: '1'
  driver: json-file

services:
  app:
    image: freeipa/freeipa-server:latest
    container_name: freeipa-app
    domainname: ${BASE_DOMAIN_NAME:-example.com}
    hostname: ${BASE_HOST_NAME:-freeipa}
    restart: always
    pull_policy: always
    privileged: true
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/New_York}
      VIRTUAL_PORT: 443
      VIRTUAL_PROTO: https
      VIRTUAL_HOST: ${BASE_HOST_NAME:-freeipa}
      IPA_SERVER_IP: 127.0.0.1
      IPA_SERVER_HOSTNAME: ${BASE_HOST_NAME:-freeipa}
      IPA_SERVER_INSTALL_OPTS: -U -r ${BASE_DOMAIN_NAME:-example.com} --no-ntp
      PASSWORD: ${APP_ADMIN_PASS:-changeme_admin_password}
      CONTAINER_NAME: freeipa-app
      HOSTNAME: ${BASE_HOST_NAME:-$HOSTNAME}
    ports:
      - '88:88/tcp'
      - '88:88/udp'
      - '389:389/tcp'
      - '464:464/tcp'
      - '636:636/tcp'
      - '464:464/udp'
      - '123:123/udp'
      - '172.17.0.1:8097:80'
      - '172.17.0.1:9444:443'
    volumes:
      - './volumes/data/freeipa:/data:z'
      - '/sys/fs/cgroup:/sys/fs/cgroup:ro'
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
    networks:
      - freeipa
      - proxy
      - cloudflare
    labels:
      - 'traefik.enable=true'
      - 'cloudflare.enable=true'
      - 'traefik.docker.network=proxy'
      - 'cloudflare.service=http://freeipa-app:443'
      - 'cloudflare.hostname=freeipa.${CLOUDFLARE_ZONE_NAME:-}'
      - 'traefik.http.routers.freeipa-app.entrypoints=http'
      - 'traefik.http.routers.freeipa-app-secure.tls=true'
      - 'traefik.http.routers.freeipa-app.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.middlewares.freeipa-app-https-redirect.redirectscheme.scheme=https'
      - 'traefik.http.routers.freeipa-app.middlewares=freeipa-app-https-redirect'
      - 'traefik.http.routers.freeipa-app-secure.entrypoints=https'
      - 'traefik.http.routers.freeipa-app-secure.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.routers.freeipa-app-secure.tls.certresolver=cloudflare'
      - 'traefik.http.routers.freeipa-app-secure.service=freeipa-app'
      - 'traefik.http.services.freeipa-app.loadbalancer.server.port=443'

networks:
  freeipa:
    name: freeipa
    external: false
  proxy:
    external: true
  cloudflare:
    external: true
